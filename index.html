<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>你的音乐博物馆 · Museum of You</title>
<style>
  :root { --primary:#9fc8ff; --accent:#b14dff; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; }
  html,body { width:100%; height:100%; overflow:hidden; background:#0b0d14;
    font-family:-apple-system,"PingFang SC","Helvetica Neue",Arial,sans-serif; color:#fff; }
  #app { position:fixed; inset:0; } canvas { display:block; }

  #intro { position:fixed; inset:0; z-index:30; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; transition:opacity 1s ease; background:radial-gradient(ellipse at center, rgba(20,22,38,.5), rgba(8,9,16,.94)); }
  #intro.hidden { opacity:0; pointer-events:none; }
  #intro .kicker { letter-spacing:.42em; font-size:12px; opacity:.55; margin-bottom:18px; }
  #intro h1 { font-size:clamp(30px,6vw,62px); font-weight:800; line-height:1.06;
    background:linear-gradient(90deg,var(--primary),var(--accent)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  #intro p { margin-top:18px; max-width:540px; opacity:.8; font-size:15px; line-height:1.7; padding:0 24px; }
  #enterBtn { margin-top:36px; padding:15px 40px; font-size:16px; font-weight:600; color:#0a0c14;
    background:linear-gradient(90deg,var(--primary),var(--accent)); border:none; border-radius:999px; cursor:pointer;
    box-shadow:0 8px 40px rgba(159,200,255,.3); transition:transform .2s, box-shadow .2s; }
  #enterBtn:hover { transform:translateY(-2px); box-shadow:0 12px 52px rgba(177,77,255,.5); }
  #enterBtn small { display:block; font-weight:400; font-size:11px; opacity:.7; margin-top:3px; }

  #hud { position:fixed; inset:0; z-index:20; pointer-events:none; opacity:0; transition:opacity 1s ease .6s; }
  #hud.show { opacity:1; }
  .panel { position:fixed; background:rgba(10,12,22,.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.12); border-radius:16px; pointer-events:auto; }
  #dataCard { top:22px; left:22px; padding:18px 20px; width:250px; }
  #dataCard .who { font-size:12px; letter-spacing:.2em; opacity:.55; }
  #dataCard .name { font-size:20px; font-weight:700; margin:4px 0 14px; }
  #dataCard .row { display:flex; justify-content:space-between; font-size:13px; padding:6px 0; border-top:1px solid rgba(255,255,255,.08); }
  #dataCard .row span:first-child { opacity:.55; } #dataCard .row span:last-child { font-weight:600; color:var(--primary); text-align:right; max-width:140px; }

  #personaSwitch { top:22px; right:22px; padding:12px; display:flex; flex-direction:column; gap:8px; width:200px; }
  #personaSwitch .lbl { font-size:11px; letter-spacing:.14em; opacity:.5; padding:2px 6px 6px; }
  #personaSwitch button { pointer-events:auto; padding:11px 14px; text-align:left; border-radius:10px; border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.04); color:#fff; cursor:pointer; font-size:14px; transition:all .2s; }
  #personaSwitch button .sub { display:block; font-size:11px; opacity:.55; margin-top:2px; }
  #personaSwitch button.active { background:linear-gradient(90deg,rgba(159,200,255,.22),rgba(177,77,255,.22)); border-color:rgba(177,77,255,.6); }

  #nowbar { bottom:26px; left:50%; transform:translateX(-50%); padding:12px 22px; display:flex; align-items:center; gap:16px; }
  #playBtn { pointer-events:auto; width:42px; height:42px; border-radius:50%; flex:0 0 auto; border:1px solid rgba(255,255,255,.25);
    background:rgba(255,255,255,.06); color:#fff; cursor:pointer; font-size:15px; }
  #nowtxt .t1 { font-size:11px; opacity:.5; letter-spacing:.15em; } #nowtxt .t2 { font-size:15px; font-weight:600; }
  #hint { position:fixed; bottom:8px; left:50%; transform:translateX(-50%); font-size:11px; opacity:.4; z-index:20; pointer-events:none; }
  #reticle { position:fixed; left:50%; top:50%; width:6px; height:6px; margin:-3px 0 0 -3px; border-radius:50%; background:rgba(255,255,255,.5);
    z-index:15; opacity:0; transition:opacity .5s; pointer-events:none; } #reticle.show { opacity:.55; }
  #toast { position:fixed; bottom:92px; left:50%; transform:translateX(-50%) translateY(10px); z-index:25; padding:9px 18px; border-radius:999px;
    background:rgba(10,12,22,.72); backdrop-filter:blur(10px); font-size:13px; opacity:0; transition:all .3s; pointer-events:none; border:1px solid rgba(255,255,255,.12); }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  #loading { position:fixed; inset:0; z-index:40; display:flex; align-items:center; justify-content:center; background:#0b0d14; font-size:13px; letter-spacing:.2em; opacity:.7; }
  #flash { position:fixed; inset:0; z-index:28; background:#0b0d14; opacity:0; pointer-events:none; transition:opacity .35s; }
</style>
</head>
<body>
<div id="app"></div>
<div id="loading">正在布展…</div>

<div id="intro" class="hidden">
  <div class="kicker">MUSEUM OF YOU</div>
  <h1>你的音乐博物馆</h1>
  <p>AI 读你的听歌记录，把你这一年的歌当成艺术品策展。<br/>推门进去，逛一座按你口味自动布展的馆——<br/>每件展品，都是一段你忘了的循环。</p>
  <button id="enterBtn">推门进馆 <small>戴上耳机更好 · 拖动 = 转头 · WASD = 走</small></button>
</div>

<div id="hud">
  <div id="dataCard" class="panel">
    <div class="who">🤖 AI 策展 · 2026 上半年</div>
    <div class="name" id="dc-name">—</div>
    <div class="row"><span>AI 判定主基调</span><span id="dc-style">—</span></div>
    <div class="row"><span>常驻艺术家</span><span id="dc-artist">—</span></div>
    <div class="row"><span>主题展区</span><span id="dc-genre">—</span></div>
    <div class="row"><span>到馆时长</span><span id="dc-min">—</span></div>
    <div class="row"><span>策展基调</span><span id="dc-mood">—</span></div>
  </div>
  <div id="personaSwitch" class="panel">
    <div class="lbl">换一份歌单 → AI 重新布展</div>
    <button data-persona="neon" class="active">霓虹夜行<span class="sub">Synthwave · The Weeknd…</span></button>
    <button data-persona="folk">晨光民谣<span class="sub">Folk · Bon Iver…</span></button>
    <button data-persona="classical">古典沉思<span class="sub">Neoclassical · Einaudi…</span></button>
  </div>
  <div id="nowbar" class="panel">
    <button id="playBtn">❚❚</button>
    <div id="nowtxt"><div class="t1">展厅环境音</div><div class="t2" id="now-song">—</div></div>
  </div>
</div>

<div id="reticle"></div>
<div id="hint">拖动 = 转头 · W A S D = 在馆里走 · 走近展品看讲解 · 中央 = 镇馆之宝</div>
<div id="toast"></div>
<div id="flash"></div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
} }
</script>

<script type="module">
import * as THREE from 'three';
import { Reflector } from 'three/addons/objects/Reflector.js';

/* ============ 风格皮：AI 判定的「主基调」→ 对应一种展厅 ============ */
const STYLES = {
  neon:      { label:'霓虹电子', amb:0.28, hemi:0.30, dark:true,  pal:{ wall:0x141826, floor:0x0c0e16, ceil:0x0a0c14, strip:0x4dd0ff, light:0xaeccff, accent:0xb14dff, frame:0x2a2f44, text:'#eaf2ff', sub:'#9fb0d8', card:'rgba(14,16,26,.92)' } },
  folk:      { label:'暖阳民谣', amb:0.34, hemi:0.36, dark:true,  pal:{ wall:0x241c14, floor:0x16110b, ceil:0x120d08, strip:0xffd27a, light:0xffe6c0, accent:0x7ad17a, frame:0x40321f, text:'#fff3e0', sub:'#d8c2a0', card:'rgba(20,15,9,.92)' } },
  classical: { label:'古典优雅', amb:0.80, hemi:0.55, dark:false, pal:{ wall:0xe7e1d4, floor:0xcfc7b8, ceil:0xf2ede2, strip:0xc9a44a, light:0xfff3da, accent:0x9a7b4f, frame:0x4a3a26, text:'#2c2418', sub:'#6f5e46', card:'rgba(244,240,232,.95)' } }
};

/* ============ 你的听歌数据（真实歌曲）→ AI 打标签 + 判定主基调 ============ */
const PROFILES = {
  neon: {
    name:'霓虹夜行', artist:'The Weeknd / M83 …', genre:'Synthwave · Electropop', minutes:18420, mood:'清醒的孤独',
    style:'neon', track:'assets/night.mp3', tempo:120, scaleType:'minor', energy:0.85,
    center:{ song:'Blinding Lights', artist:'The Weeknd', plays:412, note:'你在 3 月把它循环到天亮——这一年最不愿停下的声音。', hue:215 },
    songs:[
      { song:'Strobe',        artist:'deadmau5',  plays:233, note:'只在凌晨出现的一首。', hue:250 },
      { song:'Midnight City', artist:'M83',       plays:198, note:'通勤路上最常按下重播。', hue:270 },
      { song:'Resonance',     artist:'Home',      plays:176, note:'你给它点过最多次红心。', hue:195 },
      { song:'Nightcall',     artist:'Kavinsky',  plays:154, note:'雨夜的播放量翻三倍。', hue:230 }
    ]
  },
  folk: {
    name:'晨光民谣', artist:'Bon Iver / 周杰伦 …', genre:'Folk · Acoustic', minutes:9260, mood:'松弛的暖',
    style:'folk', track:'assets/dawn.mp3', tempo:84, scaleType:'major', energy:0.4,
    center:{ song:'Holocene', artist:'Bon Iver', plays:188, note:'你这一年的清晨配乐。', hue:150 },
    songs:[
      { song:'七里香',           artist:'周杰伦',      plays:121, note:'夏末黄昏的高频曲。', hue:40 },
      { song:"Don't Know Why",  artist:'Norah Jones', plays:104, note:'周末早晨最常出现。', hue:35 },
      { song:'旅行的意义',        artist:'陈绮贞',      plays:97,  note:'和 Holocene 最常进同一个歌单。', hue:160 },
      { song:'The Night We Met', artist:'Lord Huron', plays:88,  note:'听完平均多坐 12 分钟。', hue:90 }
    ]
  },
  classical: {
    name:'古典沉思', artist:'Einaudi / 久石让 …', genre:'Neoclassical · Cinematic', minutes:12380, mood:'安静的专注',
    style:'classical', track:'assets/classical.mp3', tempo:72, scaleType:'major', energy:0.3,
    center:{ song:'Nuvole Bianche', artist:'Ludovico Einaudi', plays:256, note:'深夜写东西时的循环背景。', hue:210 },
    songs:[
      { song:'Time',                    artist:'Hans Zimmer',  plays:174, note:'它一响你就会停下手里的事。', hue:220 },
      { song:'Summer',                  artist:'久石让',        plays:151, note:'想念的时候放。', hue:45 },
      { song:"Comptine d'un autre été", artist:'Yann Tiersen', plays:133, note:'雨天清晨的第一首。', hue:160 },
      { song:'River Flows in You',      artist:'Yiruma',       plays:120, note:'点红心最多的一首。', hue:200 }
    ]
  }
};
let current='neon';
const POOL=['assets/pool2.mp3','assets/pool4.mp3','assets/pool5.mp3','assets/pool6.mp3','assets/pool8.mp3'];

/* ============ 场景 ============ */
const app=document.getElementById('app');
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 500);
const renderer=new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.18;
app.appendChild(renderer.domElement);
let museum=new THREE.Group(); scene.add(museum);
let built=null, materialize=0;

/* ---- canvas 工具：画展品/说明牌/标题 ---- */
function tex(draw, w, h){ const c=document.createElement('canvas'); c.width=w; c.height=h; draw(c.getContext('2d'),w,h);
  const t=new THREE.CanvasTexture(c); t.anisotropy=4; return t; }
function wrap(g, text, x, y, max, lh){ const ch=[...text]; let line='', yy=y;
  for(const c of ch){ if(g.measureText(line+c).width>max && line){ g.fillText(line,x,yy); line=c; yy+=lh; } else line+=c; } g.fillText(line,x,yy); return yy; }
function hsl(h,s,l){ return `hsl(${h},${s}%,${l}%)`; }

function artTex(title, hue){ return tex((g,w,h)=>{
  let s=Math.floor(hue)*9301+49297; const rnd=()=>{ s=(s*9301+49297)%233280; return s/233280; };
  const grad=g.createLinearGradient(0,0,w*0.4,h); grad.addColorStop(0,hsl(hue,62,13)); grad.addColorStop(.55,hsl((hue+22)%360,70,32)); grad.addColorStop(1,hsl((hue+48)%360,74,50));
  g.fillStyle=grad; g.fillRect(0,0,w,h);
  for(let i=0;i<4;i++){ g.globalAlpha=0.18+rnd()*0.16; g.fillStyle=hsl((hue+i*28)%360,78,60);
    g.beginPath(); g.arc(w*(0.15+rnd()*0.7), h*(0.12+rnd()*0.5), 70+rnd()*150, 0, Math.PI*2); g.fill(); }
  g.globalAlpha=1;
  const hl=g.createRadialGradient(w*0.32,h*0.2,0,w*0.32,h*0.2,w*0.55); hl.addColorStop(0,'rgba(255,255,255,.16)'); hl.addColorStop(1,'rgba(255,255,255,0)');
  g.fillStyle=hl; g.fillRect(0,0,w,h);
  const sh=g.createLinearGradient(0,h-230,0,h); sh.addColorStop(0,'rgba(0,0,0,0)'); sh.addColorStop(1,'rgba(0,0,0,.62)'); g.fillStyle=sh; g.fillRect(0,h-230,w,230);
  g.fillStyle='#fff'; g.textBaseline='alphabetic'; let fs=58; g.font='bold '+fs+'px -apple-system,PingFang SC,Arial';
  while(g.measureText(title).width>w-80 && fs>26){ fs-=3; g.font='bold '+fs+'px -apple-system,PingFang SC,Arial'; }
  g.fillText(title,44,h-58);
}, 512, 640); }

function placardTex(song, artist, plays, note, pal){ return tex((g,w,h)=>{
  g.fillStyle='rgba(12,14,22,.93)'; g.fillRect(0,0,w,h);
  g.strokeStyle='rgba(255,255,255,.22)'; g.lineWidth=4; g.strokeRect(8,8,w-16,h-16);
  g.textBaseline='top';
  g.fillStyle='#ffffff'; g.font='bold 44px -apple-system,PingFang SC,Arial'; g.fillText(song,34,30);
  g.fillStyle='#aeb6c8'; g.font='26px -apple-system,PingFang SC,Arial'; g.fillText(artist,34,90);
  g.fillStyle='#'+pal.strip.toString(16).padStart(6,'0'); g.font='bold 30px -apple-system,PingFang SC,Arial'; g.fillText('▶ 今年播放 '+plays+' 次',34,130);
  g.fillStyle='#c7d0e0'; g.font='italic 26px -apple-system,PingFang SC,Arial'; wrap(g,'「'+note+'」',34,182,w-68,38);
}, 600, 320); }

function titleTex(sub, pal){ return tex((g,w,h)=>{
  g.fillStyle='#'+pal.wall.toString(16).padStart(6,'0'); g.fillRect(0,0,w,h); g.textBaseline='top'; g.textAlign='center';
  g.fillStyle=pal.text; g.font='bold 110px -apple-system,PingFang SC,Arial'; g.fillText('你的音乐博物馆',w/2,40);
  g.fillStyle=pal.sub; g.font='40px -apple-system,PingFang SC,Arial'; g.fillText(sub,w/2,180);
}, 1400, 280); }

function labelSprite(text, color){ const t=tex((g,w,h)=>{ g.font='bold 34px -apple-system,PingFang SC,Arial'; g.textAlign='center'; g.textBaseline='middle';
  g.fillStyle=color; g.shadowColor=color; g.shadowBlur=12; g.fillText(text,w/2,h/2); },256,64);
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:t,transparent:true,depthWrite:false})); s.scale.set(5,1.25,1); return s; }

/* ============ 建馆 ============ */
const ROOM={ w:24, l:40, h:8 };
function panel(texture, w, h, emissive){ return new THREE.Mesh(new THREE.PlaneGeometry(w,h),
  new THREE.MeshStandardMaterial({ map:texture, emissive:0xffffff, emissiveMap:texture, emissiveIntensity:emissive==null?0.85:emissive, roughness:1, metalness:0, side:THREE.DoubleSide })); }

function disposeMuseum(){ museum.traverse(o=>{ if(o.geometry)o.geometry.dispose();
  if(o.material){ (Array.isArray(o.material)?o.material:[o.material]).forEach(m=>{ if(m.map)m.map.dispose(); if(m.emissiveMap&&m.emissiveMap!==m.map)m.emissiveMap.dispose(); m.dispose(); }); } });
  scene.remove(museum); museum=new THREE.Group(); scene.add(museum); }

function buildMuseum(key){
  disposeMuseum(); const P=PROFILES[key], st=STYLES[P.style], pal=st.pal;
  scene.background=new THREE.Color(pal.ceil); scene.fog=new THREE.Fog(pal.ceil, 18, 70);
  document.documentElement.style.setProperty('--primary','#'+pal.light.toString(16).padStart(6,'0'));
  document.documentElement.style.setProperty('--accent','#'+pal.accent.toString(16).padStart(6,'0'));

  const matWall=new THREE.MeshStandardMaterial({ color:pal.wall, roughness:0.95, metalness:0 });
  const matFloor=new THREE.MeshStandardMaterial({ color:pal.floor, roughness:0.4, metalness:0.5 });
  const matFrame=new THREE.MeshStandardMaterial({ color:pal.frame, roughness:0.6, metalness:0.3 });

  // 灯光
  museum.add(new THREE.AmbientLight(0xffffff, st.amb));
  museum.add(new THREE.HemisphereLight(pal.light, pal.floor, st.hemi));
  const heroSpot=new THREE.SpotLight(pal.light, st.dark?60:26, 40, Math.PI/7, 0.5, 1.2);
  heroSpot.position.set(0,7.5,0); heroSpot.target.position.set(0,1,0); museum.add(heroSpot); museum.add(heroSpot.target);

  // 地板 / 天花 / 墙
  const floor=new Reflector(new THREE.PlaneGeometry(ROOM.w,ROOM.l), { color:0x3a4150, textureWidth:innerWidth, textureHeight:innerHeight, clipBias:0.003 });
  floor.rotation.x=-Math.PI/2; floor.position.y=0.002; museum.add(floor);
  const floorTint=new THREE.Mesh(new THREE.PlaneGeometry(ROOM.w,ROOM.l), new THREE.MeshBasicMaterial({ color:pal.floor, transparent:true, opacity:0.55 }));
  floorTint.rotation.x=-Math.PI/2; floorTint.position.y=0.004; museum.add(floorTint);
  const ceil=new THREE.Mesh(new THREE.PlaneGeometry(ROOM.w,ROOM.l), matWall); ceil.rotation.x=Math.PI/2; ceil.position.y=ROOM.h; museum.add(ceil);
  const back=new THREE.Mesh(new THREE.PlaneGeometry(ROOM.w,ROOM.h), matWall); back.position.set(0,ROOM.h/2,-ROOM.l/2); museum.add(back);
  const front=new THREE.Mesh(new THREE.PlaneGeometry(ROOM.w,ROOM.h), matWall); front.position.set(0,ROOM.h/2,ROOM.l/2); front.rotation.y=Math.PI; museum.add(front);
  const left=new THREE.Mesh(new THREE.PlaneGeometry(ROOM.l,ROOM.h), matWall); left.position.set(-ROOM.w/2,ROOM.h/2,0); left.rotation.y=Math.PI/2; museum.add(left);
  const right=new THREE.Mesh(new THREE.PlaneGeometry(ROOM.l,ROOM.h), matWall); right.position.set(ROOM.w/2,ROOM.h/2,0); right.rotation.y=-Math.PI/2; museum.add(right);
  // 顶部灯带（氛围）
  [[-ROOM.w/2+0.1,Math.PI/2],[ROOM.w/2-0.1,-Math.PI/2]].forEach(([x,ry])=>{ const s=new THREE.Mesh(new THREE.BoxGeometry(ROOM.l-2,0.12,0.12),
    new THREE.MeshBasicMaterial({color:pal.strip})); s.position.set(x,ROOM.h-0.5,0); s.rotation.y=ry; museum.add(s); });

  // 标题（后墙）
  const title=panel(titleTex(`2026 · ${P.name} · ${P.genre}`, pal), 14, 2.8, 1.0); title.position.set(0,5.2,-ROOM.l/2+0.06); museum.add(title);

  // 镇馆之宝（中央）
  const reactive=[];
  const plinth=new THREE.Mesh(new THREE.BoxGeometry(3,1.2,3), matFrame); plinth.position.set(0,0.6,0); museum.add(plinth);
  const vinyl=new THREE.Mesh(new THREE.CylinderGeometry(1.5,1.5,0.08,48), new THREE.MeshStandardMaterial({color:0x0a0a0a,roughness:0.4,metalness:0.5}));
  vinyl.position.set(0,1.32,0); museum.add(vinyl);
  const vlabel=new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.5,0.085,32), new THREE.MeshStandardMaterial({color:0xffffff,map:artTex(P.center.song,P.center.hue),emissive:0xffffff,emissiveMap:artTex(P.center.song,P.center.hue),emissiveIntensity:0.4}));
  vlabel.position.set(0,1.33,0); museum.add(vlabel);
  const hero=panel(artTex(P.center.song,P.center.hue), 4, 5, st.dark?0.9:0.42); hero.position.set(0,4.4,-2.2); hero.userData={song:P.center.song,artist:P.center.artist,track:P.track}; museum.add(hero);
  const hframe=new THREE.Mesh(new THREE.BoxGeometry(4.4,5.4,0.2), matFrame); hframe.position.set(0,4.4,-2.32); museum.add(hframe);
  const hplac=panel(placardTex(P.center.song,P.center.artist,P.center.plays,P.center.note,pal),3,1.6,0.92); hplac.position.set(0,1.45,1.55); hplac.rotation.x=-0.5; museum.add(hplac);
  const crown=labelSprite('★ 镇馆之宝', '#'+pal.strip.toString(16).padStart(6,'0')); crown.position.set(0,7,0); museum.add(crown);
  reactive.push({type:'hero', vinyl, vlabel, spot:heroSpot});

  // 四件侧展（墙上）
  const pickable=[];
  const slots=[ {x:-ROOM.w/2+0.2, z:-7, ry:Math.PI/2}, {x:-ROOM.w/2+0.2, z:7, ry:Math.PI/2},
                {x:ROOM.w/2-0.2, z:-7, ry:-Math.PI/2}, {x:ROOM.w/2-0.2, z:7, ry:-Math.PI/2} ];
  P.songs.forEach((s,i)=>{ const sl=slots[i];
    const frame=new THREE.Mesh(new THREE.BoxGeometry(0.2,4.4,3.6), matFrame); frame.position.set(sl.x + (sl.x<0?0.0:0.0), 4.4, sl.z); museum.add(frame);
    const art=panel(artTex(s.song,s.hue), 3.2, 4, st.dark?0.9:0.42); art.position.set(sl.x + (sl.x<0?0.12:-0.12), 4.4, sl.z); art.rotation.y=sl.ry;
    art.userData={song:s.song, artist:s.artist||P.artist, track:POOL[i%POOL.length]}; museum.add(art); pickable.push(art);
    const plac=panel(placardTex(s.song,s.artist||P.artist,s.plays,s.note,pal), 2.6,1.4,0.92);
    plac.position.set(sl.x + (sl.x<0?0.14:-0.14), 1.5, sl.z); plac.rotation.y=sl.ry; museum.add(plac);
    const sp=new THREE.SpotLight(pal.light, 14, 16, Math.PI/8, 0.6, 1.3);
    sp.position.set(sl.x + (sl.x<0?2.5:-2.5), 6.5, sl.z); sp.target.position.set(sl.x, 4.4, sl.z); museum.add(sp); museum.add(sp.target);
    reactive.push({type:'art', mesh:art, sp});
  });

  // 光束里的尘埃
  const mn=150, mpos=new Float32Array(mn*3);
  for(let i=0;i<mn;i++){ mpos[i*3]=(Math.random()-0.5)*ROOM.w; mpos[i*3+1]=Math.random()*ROOM.h; mpos[i*3+2]=(Math.random()-0.5)*ROOM.l; }
  const mgeo=new THREE.BufferGeometry(); mgeo.setAttribute('position',new THREE.BufferAttribute(mpos,3));
  const motes=new THREE.Points(mgeo, new THREE.PointsMaterial({ color:pal.light, size:0.05, transparent:true, opacity:0.45, depthWrite:false }));
  museum.add(motes);

  materialize=0; updateCard(P);
  pickable.push(hero); window.__PICK__=pickable;
  return { reactive, update(b,t){
    motes.rotation.y+=0.0004; motes.material.opacity=0.45*materialize;
    for(const r of reactive){ if(r.type==='hero'){ r.vinyl.rotation.y+=0.02+b.mid*0.08; r.vlabel.rotation.y=r.vinyl.rotation.y;
        r.spot.intensity=45+b.bass*70; } else { r.mesh.material.emissiveIntensity=0.8+b.mid*0.6; r.sp.intensity=12+b.mid*12; } }
  }};
}
function updateCard(P){ set('dc-name',P.name); set('dc-artist',P.artist); set('dc-genre',P.genre);
  set('dc-min',P.minutes.toLocaleString()+' 分钟'); set('dc-mood',P.mood);
  set('dc-style', STYLES[P.style].label); set('now-song',P.center.song+' — '+P.center.artist); }
function set(id,v){ document.getElementById(id).textContent=v; }

/* ============ 第一人称 ============ */
const EYE=2.4, MOVE=12, BX=ROOM.w/2-1, BZ=ROOM.l/2-1.5;
let yaw=0, pitch=0, dragging=false, lx=0,ly=0,dx0=0,dy0=0; const keys={};
addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true); addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
const dom=renderer.domElement;
dom.addEventListener('pointerdown',e=>{dragging=true;lx=dx0=e.clientX;ly=dy0=e.clientY;});
addEventListener('pointerup',e=>{ if(dragging){ if(Math.hypot(e.clientX-dx0,e.clientY-dy0)<5) pick(e); } dragging=false; });
addEventListener('pointermove',e=>{ if(!dragging||flying)return; yaw-=(e.clientX-lx)*0.0026; pitch=THREE.MathUtils.clamp(pitch-(e.clientY-ly)*0.0022,-1.0,0.9); lx=e.clientX; ly=e.clientY; });
const ray=new THREE.Raycaster(), nd=new THREE.Vector2();
function pick(e){ if(flying||!hud.classList.contains('show'))return; nd.x=e.clientX/innerWidth*2-1; nd.y=-(e.clientY/innerHeight*2-1);
  ray.setFromCamera(nd,camera); const hit=ray.intersectObjects(window.__PICK__||[],false)[0];
  if(hit&&hit.object.userData.song){ const u=hit.object.userData; playSong(u.song,u.artist,u.track); } }
function playSong(song, artist, track){ if(!ac)initAudio(); if(ac&&ac.state==='suspended')ac.resume();
  if(track && !audioEl.src.endsWith(track)){ audioEl.src=track; } audioEl.play().catch(()=>{}); fadeTo(0.8); musicOn=true;
  document.getElementById('playBtn').textContent='❚❚'; set('now-song', song+(artist?' — '+artist:'')); toast('▶ 正在播放：'+song); }

/* ============ 音频（真实曲目，同源加载 → 频谱驱动反应）============ */
let ac,analyser,freq,audioEl,srcNode,musicOn=false;
// 每个 profile 自带 track（见 PROFILES）
function fadeTo(target){ clearInterval(window.__fade); window.__fade=setInterval(()=>{ if(!audioEl)return;
  const d=target-audioEl.volume; audioEl.volume=Math.abs(d)<0.04? target : audioEl.volume+Math.sign(d)*0.04; if(audioEl.volume===target)clearInterval(window.__fade); },70); }
function initAudio(){ if(ac)return; ac=new (window.AudioContext||window.webkitAudioContext)();
  audioEl=new Audio(); audioEl.loop=true; audioEl.preload='auto'; audioEl.volume=0;
  srcNode=ac.createMediaElementSource(audioEl); analyser=ac.createAnalyser(); analyser.fftSize=1024;
  freq=new Uint8Array(analyser.frequencyBinCount); srcNode.connect(analyser); analyser.connect(ac.destination); }
function loadAndPlay(){ if(!audioEl)return; const want=PROFILES[current].track;
  if(!audioEl.src.endsWith(want)){ audioEl.src=want; } audioEl.volume=0; audioEl.play().catch(()=>{}); fadeTo(0.75); }
function startMusic(){ if(!ac)initAudio(); if(ac.state==='suspended')ac.resume(); loadAndPlay(); musicOn=true; document.getElementById('playBtn').textContent='❚❚'; }
function toggleMusic(){ if(!audioEl)return; if(musicOn){ fadeTo(0); setTimeout(()=>{if(!musicOn)audioEl.pause();},700); musicOn=false; document.getElementById('playBtn').textContent='▶'; } else { if(ac&&ac.state==='suspended')ac.resume(); audioEl.play().catch(()=>{}); fadeTo(0.75); musicOn=true; document.getElementById('playBtn').textContent='❚❚'; } }
function retune(){ if(musicOn) loadAndPlay(); }

/* ============ 入场 / UI ============ */
let flying=false, flyT=0; const clock=new THREE.Clock();
const intro=document.getElementById('intro'), hud=document.getElementById('hud');
const CAM_START=new THREE.Vector3(0,EYE,ROOM.l/2-2), CAM_HOME=new THREE.Vector3(0,EYE,9);
camera.position.copy(CAM_START); camera.rotation.order='YXZ';
document.getElementById('enterBtn').addEventListener('click',()=>{ intro.classList.add('hidden'); hud.classList.add('show');
  document.getElementById('reticle').classList.add('show'); initAudio(); startMusic(); flying=true; flyT=0; setTimeout(aiToast,2600); });
document.getElementById('playBtn').addEventListener('click',toggleMusic);
document.querySelectorAll('#personaSwitch button').forEach(b=>b.addEventListener('click',()=>{ if(b.dataset.persona===current)return; current=b.dataset.persona;
  document.querySelectorAll('#personaSwitch button').forEach(x=>x.classList.toggle('active',x===b));
  const fl=document.getElementById('flash'); fl.style.opacity='0.8';
  setTimeout(()=>{ built=buildMuseum(current); retune(); aiToast(); fl.style.opacity='0'; }, 240); }));
addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });
function toast(m){ const el=document.getElementById('toast'); el.textContent=m; el.classList.add('show'); clearTimeout(toast._t); toast._t=setTimeout(()=>el.classList.remove('show'),2400); }
function aiToast(){ const P=PROFILES[current]; toast('🤖 AI 读了你的 '+(P.songs.length+1)+' 首歌 → 主基调：'+STYLES[P.style].label+' · 已为你布展'); }
const ease=t=>t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;

/* ============ 主循环 ============ */
function animate(){ requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05), t=clock.elapsedTime;
  if(materialize<1) materialize=Math.min(1,materialize+dt*0.6);
  if(flying){ flyT+=dt/3.6; const k=ease(Math.min(flyT,1)); camera.position.lerpVectors(CAM_START,CAM_HOME,k);
    yaw=0; pitch=0; if(flyT>=1) flying=false; }
  else { camera.rotation.y=yaw; camera.rotation.x=pitch;
    let mx=0,mz=0; if(keys['w'])mz+=1; if(keys['s'])mz-=1; if(keys['a'])mx-=1; if(keys['d'])mx+=1;
    const moving=!!(mx||mz);
    if(moving){ const f=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw)), r=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));
      const mv=new THREE.Vector3().addScaledVector(f,mz).addScaledVector(r,mx).normalize().multiplyScalar(MOVE*dt);
      camera.position.add(mv); camera.position.x=THREE.MathUtils.clamp(camera.position.x,-BX,BX); camera.position.z=THREE.MathUtils.clamp(camera.position.z,-BZ,BZ); }
    camera.position.y=EYE+(moving?Math.sin(t*9)*0.06:0); }
  let b={bass:0,mid:0,treble:0};
  if(analyser&&musicOn){ analyser.getByteFrequencyData(freq); const a=(x,y)=>{let s=0;for(let i=x;i<y;i++)s+=freq[i];return s/((y-x)*255);};
    b={bass:a(2,10),mid:a(16,48),treble:a(64,120)}; }
  if(built) built.update(b,t);
  renderer.render(scene,camera);
}

/* ============ 启动 ============ */
built=buildMuseum(current); animate();
setTimeout(()=>{ document.getElementById('loading').style.display='none'; intro.classList.remove('hidden'); },400);
</script>
</body>
</html>
